name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json version
        run: npm pkg set version="${{ steps.ver.outputs.semver }}"

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore: bump version to ${{ steps.ver.outputs.semver }} [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Build release notes
        shell: python3 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          CUR_TAG:  ${{ steps.ver.outputs.tag }}
        run: |
          import os, subprocess, json, urllib.request, urllib.error

          repo    = os.environ["REPO"]
          cur_tag = os.environ["CUR_TAG"]
          token   = os.environ["GH_TOKEN"]

          def gh_get(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError:
                  return {}

          # Determine previous tag for the commit range
          all_tags = subprocess.check_output(
              ["git", "tag", "--sort=-version:refname"], text=True
          ).strip().splitlines()
          prev_tags = [t for t in all_tags if t != cur_tag]
          prev_tag  = prev_tags[0] if prev_tags else None
          git_range = f"{prev_tag}..{cur_tag}" if prev_tag else cur_tag

          raw_log = subprocess.check_output(
              ["git", "log", git_range, "--pretty=format:%H\t%s"],
              text=True
          ).strip()

          changelog    = []   # list of (subject, login)
          contributors = {}   # login -> True, insertion-ordered

          if raw_log:
              for line in raw_log.splitlines():
                  if not line.strip():
                      continue
                  sha, subject = line.split("\t", 1)
                  # Skip the automated version bump commit
                  if subject.startswith("chore: bump version"):
                      continue
                  data   = gh_get(f"/repos/{repo}/commits/{sha}")
                  author = data.get("author") or {}
                  login  = author.get("login") or \
                           data.get("commit", {}).get("author", {}).get("email", sha[:7])
                  changelog.append((subject, login))
                  contributors[login] = True

          # ── Changelog section ──────────────────────────────────────────────
          body_lines = [f"## What's Changed in `{cur_tag}`\n"]
          if changelog:
              for subject, login in changelog:
                  body_lines.append(
                      f"- {subject} &nbsp;—&nbsp; "
                      f"[@{login}](https://github.com/{login})"
                  )
          else:
              body_lines.append("_No changes recorded._")

          body_lines.append("\n---\n")

          # ── Contributors section ───────────────────────────────────────────
          body_lines.append("## Contributors\n")
          if contributors:
              for login in contributors:
                  body_lines.append(
                      f'<a href="https://github.com/{login}">'
                      f'<img src="https://github.com/{login}.png?size=64" '
                      f'width="64" height="64" '
                      f'alt="{login}" '
                      f'style="border-radius:50%;vertical-align:middle;margin:4px"/>'
                      f'</a>&nbsp;'
                      f'[@{login}](https://github.com/{login})'
                  )
          else:
              body_lines.append("_No contributors found._")

          with open("release_notes.md", "w") as f:
              f.write("\n".join(body_lines))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       Release ${{ steps.ver.outputs.tag }}
          body_path:  release_notes.md
          draft:      false
          prerelease: false
